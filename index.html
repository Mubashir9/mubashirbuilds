<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MubashirBuilds — devlog</title>
  <meta name="description" content="Building things. Writing about it." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Geist+Mono:wght@300;400;500&family=Geist:wght@300;400;500&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="bg-noise"></div>

  <header>
    <div class="header-inner">
      <div class="wordmark">
        <span class="wordmark-main">MubashirBuilds</span>
        <span class="wordmark-dot">.</span>
      </div>
      <nav class="header-meta">
        <span class="tag-pill">devlog</span>
        <a href="https://github.com/Mubashir9" target="_blank" class="gh-link">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="currentColor"><path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0 0 24 12c0-6.63-5.37-12-12-12z"/></svg>
          Mubashir9
        </a>
      </nav>
    </div>
  </header>

  <main>
    <section class="hero">
      <p class="hero-subtitle">Building things. Writing about it. Somewhere between ML papers and debugging at 2am.</p>
    </section>

    <section class="posts-section" id="posts-section">
      <div id="loading" class="loading-state">
        <div class="loading-dots"><span></span><span></span><span></span></div>
        <p>fetching posts…</p>
      </div>
      <div id="error-state" class="error-state" style="display:none">
        <p>couldn't load posts — check console for details.</p>
      </div>
      <div id="empty-state" class="empty-state" style="display:none">
        <p>no posts yet. time to write something.</p>
      </div>
      <div id="posts-list"></div>
    </section>
  </main>

  <footer>
    <span class="footer-note">MubashirBuilds · devlog</span>
    <span class="footer-note" id="post-count"></span>
  </footer>

  <!-- Post modal -->
  <div class="modal-overlay" id="modal" role="dialog" aria-modal="true">
    <div class="modal">
      <button class="modal-close" id="modal-close" aria-label="Close">×</button>
      <div class="modal-meta">
        <span class="modal-category" id="modal-category"></span>
        <span id="modal-date"></span>
      </div>
      <h1 class="modal-title" id="modal-title"></h1>
      <div class="prose" id="modal-body"></div>
    </div>
  </div>

  <script>
    // ── Config — update GITHUB_REPO to your actual repo name ──
    const GITHUB_USER = 'Mubashir9';
    const GITHUB_REPO = 'mubashirbuilds'; // e.g. 'mubashirbuilds' or 'devlog'
    const RAW = `https://raw.githubusercontent.com/${GITHUB_USER}/${GITHUB_REPO}/main`;

    marked.setOptions({ breaks: true, gfm: true });

    async function loadPosts() {
      try {
        const res = await fetch(`${RAW}/posts/index.json?t=${Date.now()}`);
        if (!res.ok) throw new Error('No index found');
        const index = await res.json();
        if (!index.length) {
          show('empty-state'); hide('loading'); return;
        }
        const posts = (await Promise.all(
          index.map(f => fetch(`${RAW}/posts/${f}?t=${Date.now()}`).then(r => r.ok ? r.json() : null))
        )).filter(Boolean);
        hide('loading');
        renderPosts(posts);
      } catch (e) {
        console.error(e);
        hide('loading'); show('error-state');
      }
    }

    function renderPosts(posts) {
      const list = document.getElementById('posts-list');
      document.getElementById('post-count').textContent =
        `${posts.length} post${posts.length !== 1 ? 's' : ''}`;

      list.innerHTML = posts.map((p, i) => {
        const excerpt = plainExcerpt(p.body, 180);
        return `
        <article class="post-card" data-i="${i}" role="button" tabindex="0">
          <div class="post-card-inner">
            <div class="post-meta">
              ${p.category ? `<span class="post-category">${esc(p.category)}</span><span class="dot">·</span>` : ''}
              <span>${fmtDate(p.date)}</span>
            </div>
            <h2 class="post-title">${esc(p.title)}</h2>
            ${excerpt ? `<p class="post-excerpt">${esc(excerpt)}</p>` : ''}
            <span class="post-read-more">read →</span>
          </div>
        </article>`;
      }).join('');

      list.querySelectorAll('.post-card').forEach(el => {
        const go = () => openModal(posts[+el.dataset.i]);
        el.addEventListener('click', go);
        el.addEventListener('keydown', e => (e.key === 'Enter' || e.key === ' ') && go());
      });
    }

    function openModal(p) {
      document.getElementById('modal-category').textContent = p.category || '';
      document.getElementById('modal-date').textContent = fmtDate(p.date);
      document.getElementById('modal-title').textContent = p.title;
      document.getElementById('modal-body').innerHTML = marked.parse(p.body || '');
      document.getElementById('modal').classList.add('open');
      document.body.style.overflow = 'hidden';
    }
    function closeModal() {
      document.getElementById('modal').classList.remove('open');
      document.body.style.overflow = '';
    }
    document.getElementById('modal-close').addEventListener('click', closeModal);
    document.getElementById('modal').addEventListener('click', e => { if (e.target === e.currentTarget) closeModal(); });
    document.addEventListener('keydown', e => e.key === 'Escape' && closeModal());

    function fmtDate(iso) {
      if (!iso) return '';
      return new Date(iso).toLocaleDateString('en-AU', { year:'numeric', month:'short', day:'numeric' });
    }
    function plainExcerpt(md = '', len = 180) {
      const t = md.replace(/[#*`>\[\]_~!]/g,'').replace(/\n+/g,' ').trim();
      return t.length > len ? t.slice(0,len)+'…' : t;
    }
    function esc(s='') {
      return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }
    function show(id) { document.getElementById(id).style.display='block'; }
    function hide(id) { document.getElementById(id).style.display='none'; }

    loadPosts();
  </script>
</body>
</html>
